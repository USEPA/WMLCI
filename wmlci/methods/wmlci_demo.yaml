# Updated Waste Reduction Model v16 excel tool data inputs.
# Changes include:
#   - Most recent IPCC data for GWP
#   - Non-truncated transporation data.
#
# Models 3 material-pathway combinations:
#   a) incineration + plastic
#   b) recycling + plastic
#   c) organics + landfill

method_name: wmlci_demo

bw_project_name: wmlci_demo

openlca_input: warm613_v16_pilot_square_2025_12_11
openlca_db_name: openlca_db
reimport_openlca: false  # set to true to reimport/clean data

lcia_input: IPCC_LCIA_methods_1.2024-12.0
lcia_db_name: IPCC
reimport_lcia: false  # set to true to reimport/clean data

ipcc_method:
  - IPCC
  - AR6-100  # TODO: this method is not in our ipcc data

functional_unit:
  amount: 907.18474  # one US short ton
  unit: kilogram

transport:
  mode: openlca_full
  distance_miles: 20
  openlca_input: null

landfill:
  lfg: national_average
  collection: typical
  moisture: national_average
  transport_miles: 20

systems:
  selection: explicit
  systems_to_model:
    "MSW landfilling of Food Waste; National average LFG recovery, typical collection, National average conditions": null
    "MSW combustion of Mixed Plastics": null
    "MSW recycling of Mixed Plastics": null

output:
  summary_csv: wmlci_demo_lcia_results.csv
  detail_csv: wmlci_demo_lcia_results_detailed.csv
