method_name: wmlci_demo
bw_project_name: wmlci_demo

inventory_source: warm613_v16_pilot_square_2025_12_11
inventory_database: openlca_db

lcia_input: ipcc_gwp
lcia_input_version: 1.2024-12.0
lcia_db_name: IPCC

lcia_method:
  - IPCC
  - AR6-100

model_defaults:
  functional_unit:
    amount: 907.18474  # one US short ton
    unit: kilogram

