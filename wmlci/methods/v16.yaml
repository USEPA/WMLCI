# Replicate Waste Reduction Model v16 using openLCA inventory data.
#
# Models 3 material-pathway combinations:
#   a) incineration + plastic
#   b) recycling + plastic
#   c) organics + landfill

method_name: waste_reduction_model_v16
bw_project_name: waste_reduction_model_v16_replication

inventory_source: warm613_v16_pilot_square_2025_12_11
inventory_database: openlca_db

lcia_input: ipcc_gwp
lcia_db_name: IPCC

lcia_method:
  - IPCC
  - AR4-100

model_defaults:
  functional_unit:
    amount: 907.18474  # one US short ton
    unit: kilogram

global_parameter_overrides:
  GWP_CH4: 25.0  # original amount output out of openlca data
  transport_distance_landfilling: 20
  transport_distance_combustion: 20
  transport_distance_recycling: 20

processes:
  "MSW landfilling of Food Waste; National average LFG recovery, typical collection, National average conditions":
  "MSW combustion of Mixed Plastics": null
  "MSW recycling of Mixed Plastics": null

output_files:
  summary_csv: v16_lcia_results.csv
  detail_csv: v16_lcia_results_detailed.csv
